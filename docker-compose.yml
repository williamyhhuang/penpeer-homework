version: "2.1"

services:
  # ── PostgreSQL 18.3 ────────────────────────────────────────────────────────
  postgres:
    image: postgres:18.3
    container_name: shortlink-postgres
    # PostgreSQL 18 在 kernel 4.9 的 Docker VM 需要放寬 seccomp 限制
    security_opt:
      - seccomp:unconfined
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       shortlink
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis 7.2.7 ───────────────────────────────────────────────────────────
  redis:
    image: redis:7.2.7-alpine
    container_name: shortlink-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    environment:
      DB_HOST:     postgres
      DB_PORT:     "5432"
      DB_USER:     postgres
      DB_PASSWORD: postgres
      DB_NAME:     shortlink
      REDIS_HOST:  redis
      REDIS_PORT:  "6379"
      SERVER_PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 以 --scale backend=3 啟動三個副本（docker-compose up --scale backend=3）
    # deploy.replicas 只在 Swarm 模式下生效，一般 compose 須用 --scale 旗標

  # ── Load Balancer ─────────────────────────────────────────────────────────
  loadbalancer:
    image: nginx:alpine
    container_name: shortlink-lb
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: shortlink-frontend
    ports:
      - "3000:80"
    depends_on:
      - loadbalancer

  # ── Cleanup Worker ────────────────────────────────────────────────────────
  cleanup:
    build:
      context: ./src/backend
      dockerfile: Dockerfile.cleanup
    environment:
      DB_HOST:     postgres
      DB_PORT:     "5432"
      DB_USER:     postgres
      DB_PASSWORD: postgres
      DB_NAME:     shortlink
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
