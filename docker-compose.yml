version: "2.1"

services:
  # ── PostgreSQL 18.3 ────────────────────────────────────────────────────────
  postgres:
    image: postgres:18.3
    container_name: shortlink-postgres
    # PostgreSQL 18 在 kernel 4.9 的 Docker VM 需要放寬 seccomp 限制
    security_opt:
      - seccomp:unconfined
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       shortlink
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis 7.2.7 ───────────────────────────────────────────────────────────
  redis:
    image: redis:7.2.7-alpine
    container_name: shortlink-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    environment:
      DB_HOST:     postgres
      DB_PORT:     "5432"
      DB_USER:     postgres
      DB_PASSWORD: postgres
      DB_NAME:     shortlink
      REDIS_HOST:  redis
      REDIS_PORT:  "6379"
      SERVER_PORT: "8080"
    expose:
      - "9091"   # Prometheus metrics port（不走 nginx，Prometheus 直接 scrape）
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 以 --scale backend=3 啟動三個副本（docker-compose up --scale backend=3）
    # deploy.replicas 只在 Swarm 模式下生效，一般 compose 須用 --scale 旗標

  # ── Load Balancer ─────────────────────────────────────────────────────────
  loadbalancer:
    image: nginx:alpine
    container_name: shortlink-lb
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: shortlink-frontend
    ports:
      - "3000:80"
    depends_on:
      - loadbalancer

  # ── Cleanup Worker ────────────────────────────────────────────────────────
  cleanup:
    build:
      context: ./src/backend
      dockerfile: Dockerfile.cleanup
    environment:
      DB_HOST:     postgres
      DB_PORT:     "5432"
      DB_USER:     postgres
      DB_PASSWORD: postgres
      DB_NAME:     shortlink
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: shortlink-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    depends_on:
      - backend
    restart: unless-stopped

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: shortlink-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_PATHS_PROVISIONING:      /etc/grafana/provisioning
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  # ── PostgreSQL Exporter ───────────────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: shortlink-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@postgres:5432/shortlink?sslmode=disable"
    expose:
      - "9187"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Redis Exporter ────────────────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: shortlink-redis-exporter
    environment:
      REDIS_ADDR: "redis:6379"
    expose:
      - "9121"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── cAdvisor（容器資源監控）──────────────────────────────────────────────
  # macOS Docker Desktop 需要授權 privileged 模式；Linux 直接可用
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: shortlink-cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    expose:
      - "8080"
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
