# 閾值與行為設定
# 這些參數屬於應用程式調校選項，不含機敏資料，可納入版本控制
# 機敏設定（DB 密碼、Redis 連線等）請保留於 .env

null_cache:
  max_keys: 10000    # 水位閥值：null cache key 超過此數量觸發淘汰
  evict_count: 1000  # 每次淘汰的 key 數量（淘汰最舊的 N 筆）

rate_limit:
  rps: 30    # 每秒允許的請求數（per-IP，redirect 路徑）
  burst: 60  # 短時間突發上限（單一窗口最多請求數）

bloom:
  capacity: 1000000  # 預期短碼最大數量（影響記憶體用量與誤判率）

cleanup:
  click_retention_days: 90    # 點擊事件保留天數，超過後封存至 click_events_archive
  interval_hours: 24          # 封存任務執行間隔（小時）

click_dedup:
  window_hours: 24    # 去重時間窗口（小時）。同一 IP + 同一短碼在此窗口內只計一次點擊
  max_keys: 0         # 水位閥值：0 = 停用水位管控（24h 窗口自然過期，通常無需額外管控）
  evict_count: 50000  # 每次淘汰數量（max_keys > 0 時生效）

worker_pool:
  click_workers: 20      # click 寫入 worker goroutine 數（有界 pool，防高流量無限開 goroutine）
  click_queue_size: 500  # click 任務緩衝佇列大小，超過時丟棄並計入 dropped 指標
  og_concurrency: 10     # OG 抓取最大並發數（semaphore 上限，保護外部 HTTP 連線數）
