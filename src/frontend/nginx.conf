server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 短網址 redirect：7 碼 base62 路徑（[0-9a-zA-Z]{7}）直接代理至後端
    # 必須放在 location / 之前，regex location 優先於 prefix location
    # 若不攔截，try_files 會把 /BpFZGcP 當成 SPA 路由回傳 index.html，完全不觸達後端
    location ~* "^/[0-9a-zA-Z]{7}$" {
        resolver           127.0.0.11 valid=10s;
        set $upstream      http://shortlink-lb:8080;
        proxy_pass         $upstream;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA：所有未命中靜態檔案的路由都交給 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 反向代理：將 /api 請求轉發至 loadbalancer（由 loadbalancer 再路由至 backend）
    # 不直連 backend 服務：backend 無固定 container name 且支援 --scale 多副本
    location /api/ {
        resolver           127.0.0.11 valid=10s;
        set $upstream      http://shortlink-lb:8080;
        proxy_pass         $upstream;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
