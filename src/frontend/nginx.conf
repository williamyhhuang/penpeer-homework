server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA：所有未命中靜態檔案的路由都交給 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 反向代理：將 /api 請求轉發至 loadbalancer（由 loadbalancer 再路由至 backend）
    # 不直連 backend 服務：backend 無固定 container name 且支援 --scale 多副本
    location /api/ {
        resolver           127.0.0.11 valid=10s;
        set $upstream      http://shortlink-lb:8080;
        proxy_pass         $upstream;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
